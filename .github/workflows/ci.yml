name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SELENE_VERSION: "0.30.0"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --check lua plugin

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ubuntu-selene-${{ env.SELENE_VERSION }}
          restore-keys: |
            cargo-ubuntu-selene-

      - name: Install Selene
        run: |
          if command -v selene >/dev/null 2>&1; then
            selene --version
            exit 0
          fi
          cargo install selene --locked --version "${SELENE_VERSION}"
          selene --version

      - name: Selene
        run: selene lua plugin

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.2

      - name: Headless load
        run: |
          export XDG_CACHE_HOME="${RUNNER_TEMP}/xdg-cache"
          export XDG_CONFIG_HOME="${RUNNER_TEMP}/xdg-config"
          export XDG_DATA_HOME="${RUNNER_TEMP}/xdg-data"
          export XDG_STATE_HOME="${RUNNER_TEMP}/xdg-state"
          mkdir -p "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME" "$XDG_DATA_HOME" "$XDG_STATE_HOME"
          nvim --version
          nvim --headless -u NONE -i NONE --cmd "set shadafile=NONE" "+set rtp+=." "+lua local p=vim.fn.tempname(); vim.fn.mkdir(p .. '/Vault/.obsidian', 'p'); require('miniobsidian').setup({ vaults_parent = p, default_vault = 'Vault' })" +q
